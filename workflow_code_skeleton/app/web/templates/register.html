<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册 - 剧本生成工作台</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v=20260410-2">
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <main class="auth-shell">
    <section class="auth-card">
      <p class="eyebrow">Create Account</p>
      <h1>注册账号</h1>
      <p class="muted">用户名不能重复，密码会加密保存。</p>
      {% if error %}
        <div class="auth-error">{{ error }}</div>
      {% endif %}
      <form method="post" class="auth-form">
        <label class="field">
          <span>用户名</span>
          <input name="username" type="text" value="{{ username or '' }}" autocomplete="username" required>
        </label>
        <label class="field">
          <span>密码</span>
          <input name="password" type="password" autocomplete="new-password" minlength="6" required>
        </label>
        <label class="field">
          <span>确认密码</span>
          <input name="confirm_password" type="password" autocomplete="new-password" minlength="6" required>
        </label>
        <button class="btn btn-primary" type="submit">注册并进入</button>
      </form>
      <p class="auth-switch">已有账号？<a href="{{ url_for('login_page') }}">去登录</a></p>
    </section>
  </main>
</body>
</html>
